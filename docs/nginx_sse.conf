# Nginx location block for SSE streaming through frappe_ai.api.chat.stream_message
# Add this inside your server {} block, before the main frappe proxy_pass location.

location /api/method/frappe_ai.api.chat.stream_message {
    proxy_pass http://frappe_app;          # adjust to match your upstream name
    proxy_http_version 1.1;

    # Disable all buffering so tokens reach the browser immediately
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;

    # Tell Nginx not to buffer this response
    add_header X-Accel-Buffering no;

    # Keep the connection alive for the full stream duration
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    keepalive_timeout 305s;

    # Required for chunked streaming
    chunked_transfer_encoding on;

    # Forward standard headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
